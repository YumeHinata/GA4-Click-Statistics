name: Hourly Views Sync

on:
  schedule:
    - cron: '0 * * * *'  # 每小时第 0 分钟执行
  workflow_dispatch:     # 允许你在 GitHub 页面上手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Sync Script
        env:
          GA_CLIENT_ID: ${{ secrets.GA_CLIENT_ID }}
          GA_CLIENT_SECRET: ${{ secrets.GA_CLIENT_SECRET }}
          GA_REFRESH_TOKEN: ${{ secrets.GA_REFRESH_TOKEN }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: |
          chmod +x sync.sh
          ./sync.sh

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/views.json
          # 如果文件没有变化，git commit 会报错，用 || exit 0 优雅退出
          git commit -m "chore: update page views [skip ci]" || exit 0
          git push