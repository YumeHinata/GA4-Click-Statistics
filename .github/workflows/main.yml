name: Hourly Views Sync

on:
  schedule:
    - cron: '31 * * * *'  # 每小时第 31 分钟执行
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Sync Script
        env:
          GA_CLIENT_ID: ${{ secrets.GA_CLIENT_ID }}
          GA_CLIENT_SECRET: ${{ secrets.GA_CLIENT_SECRET }}
          GA_REFRESH_TOKEN: ${{ secrets.GA_REFRESH_TOKEN }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: |
          chmod +x sync.sh
          ./sync.sh

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/views.json
          git commit -m "chore: update page views" || exit 0
          git push